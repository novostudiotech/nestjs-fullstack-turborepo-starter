name: CD

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - 'Dockerfile'
      - '.github/workflows/**'

  workflow_dispatch:
    inputs:
      deploy_app:
        description: 'Deploy App'
        type: boolean
        default: false
      deploy_admin:
        description: 'Deploy Admin'
        type: boolean
        default: false

permissions:
  contents: read

env:
  NODE_VERSION: '24'

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.result.outputs.app }}
      admin: ${{ steps.result.outputs.admin }}
    steps:
      - uses: actions/checkout@v6

      - uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            app:
              - 'apps/app/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
            admin:
              - 'apps/admin/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'

      - name: Resolve deploy targets
        id: result
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "app=${{ inputs.deploy_app }}" >> $GITHUB_OUTPUT
            echo "admin=${{ inputs.deploy_admin }}" >> $GITHUB_OUTPUT
          else
            echo "app=${{ steps.filter.outputs.app }}" >> $GITHUB_OUTPUT
            echo "admin=${{ steps.filter.outputs.admin }}" >> $GITHUB_OUTPUT
          fi

  app:
    name: Deploy App
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: npx turbo run build --filter=app...

      # TODO: Configure your deployment target
      # - name: Deploy to Cloudflare Pages
      #   run: npx wrangler pages deploy apps/app/dist --project-name your-project-app
      #   env:
      #     CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  admin:
    name: Deploy Admin
    needs: changes
    if: needs.changes.outputs.admin == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: npx turbo run build --filter=admin...

      # TODO: Configure your deployment target
      # - name: Deploy to Cloudflare Pages
      #   run: npx wrangler pages deploy apps/admin/dist --project-name your-project-admin
      #   env:
      #     CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
