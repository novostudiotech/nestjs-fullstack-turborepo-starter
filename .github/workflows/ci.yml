  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: trufflesecurity/trufflehog@main
        id: trufflehog
        with:
          path: ./
          extra_args: --results=verified,unknown
        continue-on-error: true

      - name: Summarize
        if: always()
        run: |
          if [ "${{ steps.trufflehog.outcome }}" == "failure" ]; then
            echo "TruffleHog found secrets" | tee -a "$GITHUB_STEP_SUMMARY"
            exit 1
          else
            echo "No secrets found" | tee -a "$GITHUB_STEP_SUMMARY"
          fi
